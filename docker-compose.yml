version: "3.8"

services:
  pdf-qa:
    build:
      context: ./QA
      dockerfile: Dockerfile
    container_name: pdf-qa
    ports:
      - "7860:7860"
    environment:
      - BASE_URL=${BASE_URL}
      - API_KEY=${API_KEY}
      - MODEL_NAME=${MODEL_NAME:-qwen-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v3}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.3}
      - RETRIEVAL_K=${RETRIEVAL_K:-10}
      - APP_PORT=7860
    volumes:
      - chroma_data:/app/chroma_db
    restart: unless-stopped

volumes:
  chroma_data:
